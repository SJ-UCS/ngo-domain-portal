
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

:root{
  --bg-main:#f4f8ff;
  --bg-grad-1:#dbeafe;
  --bg-grad-2:#ede9fe;
  --glass-bg:rgba(255,255,255,.65);
  --glass-border:rgba(255,255,255,.4);
  --text:#10213d;
  --text-soft:#4e5f80;
  --line:#b8c7e6;
  --line-strong:#7ea0df;
  --brand-1:#6366f1;
  --brand-2:#8b5cf6;
  --brand-3:#0ea5e9;
  --ok:#16a34a;
  --warn:#dc2626;
}

*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Inter',var(--font-sans,sans-serif);
  color:var(--text);
  background:
    radial-gradient(circle at 8% 10%,rgba(139,92,246,.2),transparent 35%),
    radial-gradient(circle at 92% 8%,rgba(14,165,233,.22),transparent 35%),
    linear-gradient(160deg,var(--bg-main) 0%,var(--bg-grad-1) 45%,var(--bg-grad-2) 100%);
  min-height:100vh;
}
#app{
  max-width:1180px;
  margin:20px auto;
  padding:1.25rem;
  border-radius:20px;
  border:1px solid var(--glass-border);
  background:var(--glass-bg);
  backdrop-filter:blur(10px);
  box-shadow:0 18px 40px rgba(21,36,77,.12);
}
.top-bar{display:flex;gap:10px;margin-bottom:1rem;align-items:center;flex-wrap:wrap}
.top-bar input{
  flex:1;
  min-width:220px;
  font-size:14px;
  font-family:var(--font-mono,monospace);
  height:42px;
  padding:0 14px;
  border-radius:10px;
  border:1px solid var(--line-strong);
  background:rgba(255,255,255,.75);
  color:var(--text);
  box-shadow:0 6px 18px rgba(59,91,163,.08);
  transition:all .25s ease;
}
.top-bar input:hover,.sim-bar input:hover{border-color:#5f84cc}
.top-bar input:focus,.sim-bar input:focus{
  outline:none;
  border-color:var(--brand-1);
  box-shadow:0 0 0 3px rgba(99,102,241,.18),0 10px 24px rgba(54,82,154,.14);
  background:#fff;
}
.btn{
  height:40px;
  padding:0 16px;
  border-radius:10px;
  border:1px solid rgba(99,102,241,.35);
  background:linear-gradient(135deg,#eef2ff,#dbeafe);
  color:#1f2a44;
  font-size:13px;
  font-weight:600;
  letter-spacing:.1px;
  cursor:pointer;
  box-shadow:0 8px 16px rgba(93,116,170,.16);
  transition:transform .18s ease,box-shadow .2s ease,filter .2s ease,background .2s ease;
}
.btn:hover{
  transform:translateY(-1px) scale(1.03);
  background:linear-gradient(135deg,#e0e7ff,#c7d2fe);
  box-shadow:0 12px 22px rgba(75,95,150,.22);
}
.btn:active{transform:translateY(0) scale(.99)}
.btn.pri{
  background:linear-gradient(135deg,var(--brand-1),var(--brand-2));
  color:#fff;
  border-color:rgba(99,102,241,.55);
}
.btn.pri:hover{
  background:linear-gradient(135deg,var(--brand-2),var(--brand-3));
  filter:saturate(1.1);
}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem}
.chips-label{font-size:12px;color:var(--text-soft);align-self:center;font-weight:600}
.chip{
  padding:5px 11px;
  border-radius:999px;
  border:1px solid #c7c9ff;
  font-size:12px;
  font-family:var(--font-mono,monospace);
  cursor:pointer;
  background:#f3f4ff;
  color:#3d4f7f;
  transition:all .2s ease;
}
.chip:nth-child(2){background:#eef6ff;border-color:#b9d7ff}
.chip:nth-child(3){background:#f4f1ff;border-color:#ccc0ff}
.chip:nth-child(4){background:#ecfeff;border-color:#b7f0fa}
.chip:nth-child(5){background:#fef3f2;border-color:#fecaca}
.chip:nth-child(6){background:#f0fdf4;border-color:#bbf7d0}
.chip:hover{
  transform:scale(1.05);
  border-color:#7c89e6;
  color:#1f2a44;
  box-shadow:0 8px 16px rgba(87,107,167,.15);
}
.err{
  font-size:13px;
  color:var(--warn);
  margin-bottom:1rem;
  padding:10px 12px;
  background:rgba(220,38,38,.08);
  border:1px solid rgba(220,38,38,.2);
  border-radius:10px;
  display:none;
}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1rem}
.stat-card{
  background:linear-gradient(145deg,rgba(255,255,255,.72),rgba(236,243,255,.9));
  border:1px solid rgba(126,160,223,.3);
  border-radius:12px;
  padding:12px;
  box-shadow:0 10px 22px rgba(71,95,151,.12);
}
.stat-val{font-size:22px;font-weight:700;line-height:1;color:#243e73}
.stat-lbl{font-size:11px;color:var(--text-soft);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
.tabs{
  display:flex;
  gap:8px;
  margin-bottom:1rem;
  border:none;
  border-radius:999px;
  width:fit-content;
  padding:6px;
  background:rgba(255,255,255,.58);
  box-shadow:inset 0 0 0 1px rgba(126,160,223,.25);
}
.tab{
  padding:8px 16px;
  font-size:13px;
  cursor:pointer;
  background:transparent;
  border:none;
  border-radius:999px;
  color:var(--text-soft);
  font-weight:600;
  transition:all .2s ease;
}
.tab:hover{background:rgba(99,102,241,.12);color:#2a3f73;transform:translateY(-1px)}
.tab.active{
  background:linear-gradient(135deg,var(--brand-1),var(--brand-2));
  color:#fff;
  box-shadow:0 8px 16px rgba(99,102,241,.26);
}
.diagram-wrap{
  width:100%;
  overflow-x:auto;
  border:1px solid rgba(126,160,223,.3);
  border-radius:14px;
  margin-bottom:1rem;
  padding:12px;
  background:linear-gradient(160deg,rgba(255,255,255,.8),rgba(233,243,255,.8));
  box-shadow:0 14px 26px rgba(58,87,142,.12);
}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--text-soft);margin-bottom:1rem}
.leg{display:flex;align-items:center;gap:6px}
.leg-c{width:13px;height:13px;border-radius:50%;border:1.5px solid}
.sim-bar{display:flex;gap:10px;margin-bottom:.7rem;align-items:center;flex-wrap:wrap}
.sim-bar input{
  flex:1;
  min-width:220px;
  height:40px;
  padding:0 14px;
  border-radius:10px;
  border:1px solid var(--line-strong);
  background:rgba(255,255,255,.75);
  color:var(--text);
  font-family:var(--font-mono,monospace);
  font-size:14px;
  box-shadow:0 6px 18px rgba(59,91,163,.08);
  transition:all .25s ease;
}
.sim-result{
  font-size:14px;
  padding:10px 12px;
  border-radius:10px;
  display:none;
  font-weight:600;
  margin-bottom:.6rem;
  border:1px solid transparent;
}
.sim-result.acc{background:rgba(22,163,74,.1);color:var(--ok);border-color:rgba(22,163,74,.25);display:block}
.sim-result.rej{background:rgba(220,38,38,.1);color:var(--warn);border-color:rgba(220,38,38,.25);display:block}
.steps-box{
  font-size:12px;
  color:var(--text-soft);
  max-height:120px;
  overflow-y:auto;
  display:none;
  border:1px solid rgba(126,160,223,.25);
  border-radius:10px;
  padding:8px 10px;
  background:rgba(255,255,255,.55);
}
.steps-box.show{display:block}
.step-row{padding:4px 0;border-bottom:1px solid rgba(126,160,223,.2);font-family:var(--font-mono,monospace)}
.step-row:last-child{border-bottom:none}
.trans-table{
  width:100%;
  border-collapse:separate;
  border-spacing:0;
  font-size:12px;
  font-family:var(--font-mono,monospace);
  margin-bottom:1rem;
  overflow:hidden;
  border:1px solid rgba(126,160,223,.25);
  border-radius:12px;
  background:rgba(255,255,255,.68);
}
.trans-table th{
  text-align:left;
  padding:8px 10px;
  border-bottom:1px solid rgba(126,160,223,.3);
  color:var(--text-soft);
  font-weight:600;
  background:rgba(238,244,255,.8);
}
.trans-table td{padding:7px 10px;border-bottom:1px solid rgba(126,160,223,.15)}
.trans-table tr:hover td{background:rgba(224,235,255,.45)}
.badge{display:inline-block;padding:2px 7px;border-radius:999px;font-size:10px;font-weight:600;border:1px solid transparent}
.badge-start{background:#e0edff;color:#0f4f96;border-color:#b6d3ff}
.badge-acc{background:#e6f9ec;color:#1f7a3b;border-color:#b9ebc8}
.badge-dead{background:#f4f4f5;color:#52525b;border-color:#d4d4d8}

@media (max-width:768px){
  #app{margin:12px;padding:1rem;border-radius:16px}
  .tabs{width:100%;overflow-x:auto}
  .tab{white-space:nowrap}
  .btn{height:38px}
  .top-bar input,.sim-bar input{min-width:100%}
}
</style>

<div id="app">
  <div class="top-bar">
    <input id="ri" type="text" placeholder="(a|b)*abb" value="(a|b)*abb" spellcheck="false"/>
    <button class="btn pri" onclick="run()">Build</button>
  </div>
  <div class="chips">
    <span class="chips-label">Try:</span>
    <span class="chip" onclick="setEx('(a|b)*abb')">(a|b)*abb</span>
    <span class="chip" onclick="setEx('a*b+')">a*b+</span>
    <span class="chip" onclick="setEx('(0|1)*00')">(0|1)*00</span>
    <span class="chip" onclick="setEx('ab?c')">ab?c</span>
    <span class="chip" onclick="setEx('(a|b)*(aa|bb)')">(a|b)*(aa|bb)</span>
  </div>
  <div class="err" id="err"></div>

  <div class="stats-row">
    <div class="stat-card"><div class="stat-val" id="s-nfa-st">—</div><div class="stat-lbl">NFA states</div></div>
    <div class="stat-card"><div class="stat-val" id="s-nfa-tr">—</div><div class="stat-lbl">NFA transitions</div></div>
    <div class="stat-card"><div class="stat-val" id="s-dfa-st">—</div><div class="stat-lbl">DFA states</div></div>
    <div class="stat-card"><div class="stat-val" id="s-dfa-tr">—</div><div class="stat-lbl">DFA transitions</div></div>

  </div>

  <div class="tabs">
    <button class="tab active" id="tab-nfa" onclick="switchTab('nfa')">ε-NFA</button>
    <button class="tab" id="tab-dfa" onclick="switchTab('dfa')">DFA</button>
    <button class="tab" id="tab-table" onclick="switchTab('table')">Transition table</button>
    <button class="tab" id="tab-sim" onclick="switchTab('sim')">Simulate</button>
  </div>

  <div class="legend">
    <span class="leg"><span class="leg-c" style="background:#e6f1fb;border-color:#185fa5"></span>start</span>
    <span class="leg"><span class="leg-c" style="background:#eaf3de;border-color:#3b6d11"></span>accept</span>
    <span class="leg"><span class="leg-c" style="background:var(--color-background-secondary);border-color:#888"></span>normal</span>
    <span class="leg"><span class="leg-c" style="background:#f1efe8;border-color:#b4b2a9"></span>dead (DFA)</span>
  </div>

  <div id="pane-nfa">
    <div class="diagram-wrap"><svg id="svg-nfa" width="800" height="10" style="display:block"></svg></div>
  </div>

    <div style="overflow-x:auto"><table class="trans-table" id="tbl"></table></div>
  </div>

    <div class="sim-bar">
      <input id="si" type="text" placeholder="test string…" value=""/>
      <button class="btn" onclick="simNFA()">Test on NFA</button>
      <button class="btn pri" onclick="simDFA()">Test on DFA</button>
    </div>

  </div>
</div>

<script>
let curNFA=null, curDFA=null, nfaStates=[], dfaData=null;
let sid=0;
function ns(acc=false){return{id:sid++,accept:acc,trans:{}};}
function eps(a,b){if(!a.trans['ε'])a.trans['ε']=[];a.trans['ε'].push(b);}
function ch(c){const s=ns(),e=ns();s.trans[c]=[e];return{start:s,end:e};}
function cat(a,b){eps(a.end,b.start);a.end.accept=false;return{start:a.start,end:b.end};}
function uni(a,b){const s=ns(),e=ns();eps(s,a.start);eps(s,b.start);eps(a.end,e);eps(b.end,e);a.end.accept=false;b.end.accept=false;return{start:s,end:e};}
function sta(a){const s=ns(),e=ns();eps(s,a.start);eps(s,e);eps(a.end,a.start);eps(a.end,e);a.end.accept=false;return{start:s,end:e};}
function plu(a){const s=ns(),e=ns();eps(s,a.start);eps(a.end,a.start);eps(a.end,e);a.end.accept=false;return{start:s,end:e};}
function opt(a){const s=ns(),e=ns();eps(s,a.start);eps(s,e);eps(a.end,e);a.end.accept=false;return{start:s,end:e};}

function addDot(re){
  let o='';
  const isA=c=>/[a-zA-Z0-9\.]/.test(c)||c===')'||c==='*'||c==='+'||c==='?';
  const isS=c=>/[a-zA-Z0-9\.\(]/.test(c);
  for(let i=0;i<re.length;i++){o+=re[i];if(i+1<re.length&&isA(re[i])&&isS(re[i+1]))o+='·';}
  return o;
}
function postfix(re){
  const pr={'|':1,'·':2,'*':3,'+':3,'?':3};
  re=addDot(re);let o=[],ops=[];
  for(let c of re){
    if(/[a-zA-Z0-9\.]/.test(c)){o.push(c);continue;}
    if(c==='('){ops.push(c);continue;}
    if(c===')'){while(ops.length&&ops[ops.length-1]!=='(')o.push(ops.pop());ops.pop();continue;}
    while(ops.length&&ops[ops.length-1]!=='('&&(pr[ops[ops.length-1]]||0)>=(pr[c]||0)&&!new Set(['*','+','?']).has(c))o.push(ops.pop());
    ops.push(c);
  }
  while(ops.length)o.push(ops.pop());
  return o.join('');
}
function buildNFA(pf){
  sid=0;const stk=[];
  for(let c of pf){
    if(c==='*'){stk.push(sta(stk.pop()));}
    else if(c==='+'){stk.push(plu(stk.pop()));}
    else if(c==='?'){stk.push(opt(stk.pop()));}
    else if(c==='·'){const b=stk.pop(),a=stk.pop();stk.push(cat(a,b));}
    else if(c==='|'){const b=stk.pop(),a=stk.pop();stk.push(uni(a,b));}
    else{stk.push(ch(c==='.'?'Σ':c));}
  }
  if(stk.length!==1)throw new Error('Invalid regex');
  stk[0].end.accept=true;return stk[0];
}
function collect(start){
  const vis=new Set(),q=[start],all=[];
  while(q.length){const s=q.shift();if(vis.has(s.id))continue;vis.add(s.id);all.push(s);Object.values(s.trans).flat().forEach(n=>q.push(n));}
  return all.sort((a,b)=>a.id-b.id);
}
function epsClose(ids,stMap){
  const res=new Set(ids),q=[...ids];
  while(q.length){const id=q.shift();const s=stMap[id];if(!s)continue;(s.trans['ε']||[]).forEach(n=>{if(!res.has(n.id)){res.add(n.id);q.push(n.id);}});}
  return [...res].sort((a,b)=>a-b);
}
function mvIds(ids,c,stMap){
  const res=new Set();
  ids.forEach(id=>{const s=stMap[id];if(!s)return;(s.trans[c]||[]).concat(c!=='Σ'?(s.trans['Σ']||[]):[]).forEach(n=>res.add(n.id));});
  return [...res];
}
function nfa2dfa(nfa,states){
  const stMap={};states.forEach(s=>stMap[s.id]=s);
  const alpha=[...new Set(states.flatMap(s=>Object.keys(s.trans).filter(k=>k!=='ε'&&k!=='Σ')))].sort();
  const startCl=epsClose([nfa.start.id],stMap);
  const key=ids=>ids.join(',');
  const dfaSts=[],dfaTr=[],queue=[startCl],seen={};
  const getId=ids=>{const k=key(ids);if(seen[k]===undefined){seen[k]=dfaSts.length;const isAcc=ids.some(id=>stMap[id]&&stMap[id].accept);dfaSts.push({id:seen[k],nfaIds:ids,accept:isAcc,isStart:seen[k]===0});}return seen[k];};
  getId(startCl);
  while(queue.length){
    const cur=queue.shift();const cid=getId(cur);
    alpha.forEach(c=>{
      const mv=mvIds(cur,c,stMap);
      const cl=epsClose(mv,stMap);
      const k=key(cl);
      const isNew=seen[k]===undefined;
      const tid=getId(cl);
      if(cl.length===0){
        const dead=getId([]);
        dfaTr.push({from:cid,to:dead,label:c});
      } else {
        if(isNew)queue.push(cl);
        dfaTr.push({from:cid,to:tid,label:c});
      }
    });
  }
  return{states:dfaSts,trans:dfaTr,alpha,startId:0};
}

function validate(re){
  if(!re)throw new Error('Empty expression');
  let d=0;for(let c of re){if(c==='(')d++;else if(c===')'){d--;if(d<0)throw new Error('Unmatched )');}}
  if(d)throw new Error('Unmatched (');
  if(/[*+?|]/.test(re[0]))throw new Error('Cannot start with operator');
}

function run(){
  document.getElementById('err').style.display='none';
  const re=document.getElementById('ri').value.trim();
  try{
    validate(re);
    const pf=postfix(re);
    const nfa=buildNFA(pf);
    curNFA=nfa; nfaStates=collect(nfa.start);
    const dfa=nfa2dfa(nfa,nfaStates);
    curDFA=dfa; dfaData=dfa;
    document.getElementById('s-nfa-st').textContent=nfaStates.length;
    let nt=0;nfaStates.forEach(s=>Object.values(s.trans).forEach(ts=>nt+=ts.length));
    document.getElementById('s-nfa-tr').textContent=nt;
    document.getElementById('s-dfa-st').textContent=dfa.states.length;
    document.getElementById('s-dfa-tr').textContent=dfa.trans.length;
    document.getElementById('s-alpha').textContent='{'+dfa.alpha.join(',')+'}';
    renderNFASvg();
    renderDFASvg();
    buildTable();
    clearSim();
  }catch(e){const el=document.getElementById('err');el.textContent='Error: '+e.message;el.style.display='block';}
}

function setEx(r){document.getElementById('ri').value=r;run();}

function switchTab(t){
  ['nfa','dfa','table','sim'].forEach(x=>{
    document.getElementById('pane-'+x).style.display=x===t?'':'none';
    document.getElementById('tab-'+x).className='tab'+(x===t?' active':'');
  });
}

function layoutGraph(nodes, edges, nodeR=22){
  const ranks={};
  const adj={};
  nodes.forEach(n=>{adj[n.id]=[];});
  edges.forEach(e=>{if(e.from!==e.to)(adj[e.from]||[]).push(e.to);});
  const startNode=nodes.find(n=>n.isStart)||nodes[0];
  const q=[startNode.id];const vis=new Set([startNode.id]);ranks[startNode.id]=0;
  while(q.length){const id=q.shift();(adj[id]||[]).forEach(to=>{if(!vis.has(to)){vis.add(to);ranks[to]=ranks[id]+1;q.push(to);}});}
  nodes.forEach(n=>{if(ranks[n.id]===undefined)ranks[n.id]=Object.keys(ranks).length;});
  const groups={};
  nodes.forEach(n=>{const r=ranks[n.id];if(!groups[r])groups[r]=[];groups[r].push(n.id);});
  const maxR=Math.max(...Object.keys(groups).map(Number));
  const SX=110,SY=85,PX=60,PY=50;
  const pos={};
  for(let r=0;r<=maxR;r++){
    const g=groups[r]||[];
    g.forEach((id,i)=>{pos[id]={x:PX+r*SX, y:PY+i*SY};});
  }
  const maxRows=Math.max(...Object.values(groups).map(g=>g.length));
  return{pos,W:Math.max(PX*2+(maxR+1)*SX,200),H:Math.max(PY*2+maxRows*SY,120)};
}

function svgArrow(){
return ` <defs> <marker id="arrow"
   viewBox="0 0 10 10"
   refX="10"
   refY="5"
   markerWidth="7"
   markerHeight="7"
   orient="auto">
  <path d="M0 0 L10 5 L0 10 Z" fill="#333"/>
</marker>
</defs>`;
}

function drawEdges(nodes,edges,pos,R,forDFA){
  let s='';
  const byPair={};
  edges.forEach(e=>{const k=`${e.from}-${e.to}`;if(!byPair[k])byPair[k]=[];byPair[k].push(e.label);});
  const drawn=new Set();
  edges.forEach(e=>{
    const k=`${e.from}-${e.to}`;
    if(drawn.has(k))return;drawn.add(k);
    const lbl=byPair[k].join(',');
    const p1=pos[e.from],p2=pos[e.to];if(!p1||!p2)return;
    const isEps=lbl==='ε';
    const col=isEps?'#7b8499':'#333';
    const revK=`${e.to}-${e.from}`;
    const hasBoth=byPair[revK]&&e.from!==e.to;
    let pathD,lx,ly;
    if(e.from===e.to){
      const x=p1.x,y=p1.y-R;
      pathD=`M${x} ${y} C${x+30} ${y-40},${x-30} ${y-40},${x} ${y}`;
      lx=x;ly=y-42;
    } else {
      const dx=p2.x-p1.x,dy=p2.y-p1.y,d=Math.sqrt(dx*dx+dy*dy);
      const ux=dx/d,uy=dy/d;
      const sx=p1.x+ux*R,sy=p1.y+uy*R,ex=p2.x-ux*R,ey=p2.y-uy*R;
      const off=hasBoth?34:18,nx=-uy,ny=ux;
      const mx=(sx+ex)/2+nx*off,my=(sy+ey)/2+ny*off;
      pathD=`M${sx} ${sy} Q${mx} ${my} ${ex} ${ey}`;
      lx=(sx+mx*2+ex)/4;ly=(sy+my*2+ey)/4;
    }
    s+=`<path d="${pathD}" fill="none" stroke="${col}" stroke-width="2" marker-end="url(#arrow)" ${isEps?'stroke-dasharray="4 3"':''}/>`;
    s+=`<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="central" font-size="14" font-family="var(--font-mono,monospace)" fill="#222">${lbl}</text>`;
  });
  return s;
}

function drawNodes(nodes,pos,R,labelFn){
  let s='';
  nodes.forEach(n=>{
    const p=pos[n.id];if(!p)return;
    const isS=n.isStart,isA=n.accept,isDead=n.isDead;
    const fill=isDead?'#f1efe8':isS?'#e6f1fb':isA?'#eaf3de':'var(--color-background-secondary)';
    const stroke=isDead?'#b4b2a9':isS?'#185fa5':isA?'#3b6d11':'#888';
    const sw=(isS||isA)?1.5:0.5;
    s+=`<circle cx="${p.x}" cy="${p.y}" r="${R}" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/>`;
    if(isA)s+=`<circle cx="${p.x}" cy="${p.y}" r="${R-5}" fill="none" stroke="${stroke}" stroke-width="0.8"/>`;
    if(isS)s+=`<path d="M${p.x-R-18} ${p.y-8} L${p.x-R-3} ${p.y} L${p.x-R-18} ${p.y+8}" fill="none" stroke="${stroke}" stroke-width="1" marker-end="url(#arrow)"/>`;
    s+=`<text x="${p.x}" y="${p.y}" text-anchor="middle" dominant-baseline="central" font-size="11" font-family="var(--font-sans,sans-serif)" fill="${stroke}" font-weight="500">${labelFn(n)}</text>`;
  });
  return s;
}

function renderNFASvg(){
  const nodes=nfaStates.map(s=>({id:s.id,isStart:s.id===curNFA.start.id,accept:s.accept}));
  const edges=[];
  nfaStates.forEach(s=>Object.entries(s.trans).forEach(([l,ts])=>ts.forEach(t=>edges.push({from:s.id,to:t.id,label:l}))));
  const {pos,W,H}=layoutGraph(nodes,edges);
  const svg=document.getElementById('svg-nfa');
  svg.setAttribute('width',W);svg.setAttribute('height',H);svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  svg.innerHTML=svgArrow()+drawEdges(nodes,edges,pos,22,false)+drawNodes(nodes,pos,22,n=>`q${n.id}`);
}

function renderDFASvg(){
  const dfa=dfaData;
  const nodes=dfa.states.map(s=>({id:s.id,isStart:s.isStart,accept:s.accept,isDead:s.nfaIds.length===0}));
  const edges=dfa.trans;
  const {pos,W,H}=layoutGraph(nodes,edges);
  const svg=document.getElementById('svg-dfa');
  svg.setAttribute('width',W);svg.setAttribute('height',H);svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  svg.innerHTML=svgArrow()+drawEdges(nodes,edges,pos,22,true)+drawNodes(nodes,pos,22,n=>`D${n.id}`);
}

function buildTable(){
  const dfa=dfaData;
  const alpha=dfa.alpha;
  const trMap={};
  dfa.trans.forEach(t=>{if(!trMap[t.from])trMap[t.from]={};trMap[t.from][t.label]=t.to;});
  let html=`<tr><th>State</th><th>NFA set</th>`;
  alpha.forEach(c=>html+=`<th>${c}</th>`);
  html+=`</tr>`;
  dfa.states.forEach(s=>{
    const isDead=s.nfaIds.length===0;
    let badges='';
    if(s.isStart)badges+=`<span class="badge badge-start">start</span> `;
    if(s.accept)badges+=`<span class="badge badge-acc">accept</span>`;
    if(isDead)badges+=`<span class="badge badge-dead">dead</span>`;
    html+=`<tr><td>D${s.id} ${badges}</td><td>{${s.nfaIds.map(i=>'q'+i).join(',')||'∅'}}</td>`;
    alpha.forEach(c=>{const to=(trMap[s.id]||{})[c];html+=`<td>${to!==undefined?'D'+to:'—'}</td>`;});
    html+=`</tr>`;
  });
  document.getElementById('tbl').innerHTML=html;
}

function clearSim(){document.getElementById('sim-r').className='sim-result';document.getElementById('sim-steps').classList.remove('show');}

function simNFA(){
  if(!curNFA)return;
  const str=document.getElementById('si').value;
  const stMap={};nfaStates.forEach(s=>stMap[s.id]=s);
  let cur=epsClose([curNFA.start.id],stMap);
  const steps=[`Start ε-closure: {${cur.map(i=>'q'+i).join(',')}}`];
  for(let c of str){
    const mv=mvIds(cur,c,stMap);
    cur=epsClose(mv,stMap);
    steps.push(`'${c}' → move+ε: {${cur.map(i=>'q'+i).join(',')||'∅'}}`);
  }
  const acc=cur.some(id=>stMap[id]&&stMap[id].accept);
  showSimResult(acc,str,'NFA',steps);
}

function simDFA(){
  if(!dfaData)return;
  const str=document.getElementById('si').value;
  const dfa=dfaData;
  const trMap={};
  dfa.trans.forEach(t=>{if(!trMap[t.from])trMap[t.from]={};trMap[t.from][t.label]=t.to;});
  let cur=dfa.startId;
  const steps=[`Start: D${cur}`];
  for(let c of str){
    const nxt=(trMap[cur]||{})[c];
    if(nxt===undefined){steps.push(`'${c}' → no transition (reject)`);cur=-1;break;}
    cur=nxt;steps.push(`'${c}' → D${cur}`);
  }
  const acc=cur>=0&&dfa.states[cur]&&dfa.states[cur].accept;
  showSimResult(acc,str,'DFA',steps);
}

function showSimResult(acc,str,which,steps){
  const r=document.getElementById('sim-r');
  r.textContent=(acc?'✓ ':'✗ ')+`"${str||'ε'}" is ${acc?'ACCEPTED':'REJECTED'} by ${which}`;
  r.className='sim-result '+(acc?'acc':'rej');
  const sb=document.getElementById('sim-steps');
  sb.innerHTML=steps.map(s=>`<div class="step-row">${s}</div>`).join('');
  sb.classList.add('show');
}

function epsClose(ids,stMap){
  const res=new Set(ids),q=[...ids];
  while(q.length){const id=q.shift();const s=stMap[id];if(!s)continue;(s.trans['ε']||[]).forEach(n=>{if(!res.has(n.id)){res.add(n.id);q.push(n.id);}});}
  return[...res].sort((a,b)=>a-b);
}
function mvIds(ids,c,stMap){
  const res=new Set();
  ids.forEach(id=>{const s=stMap[id];if(!s)return;(s.trans[c]||[]).concat(c!=='Σ'?(s.trans['Σ']||[]):[]).forEach(n=>res.add(n.id));});
  return[...res];
}

document.getElementById('ri').addEventListener('keydown',e=>{if(e.key==='Enter')run();});
document.getElementById('si').addEventListener('keydown',e=>{if(e.key==='Enter')simDFA();});
run();
</script>
